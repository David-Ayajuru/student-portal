<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/module2
    .css">
    <title>student Registration</title>
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <h1>Student Registration</h1>
            <p>Create your student portal account</p>
            <div id="messageBox"></div>

            <div id="messageBox"></div>

            <form id="registerForm">

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required />
                    <small class="error" id="nameError"></small>
                </div>


                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required />
                    <small class="error" id="emailError"></small>
                </div>


                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required />
                    <small class="error" id="phoneError"></small>
                </div>


                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <small class="error" id="genderError"></small>
                </div>


                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" placeholder="Enter your department" required />
                    <small class="error" id="departmentError"></small>
                </div>


                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required />
                    <small class="error" id="passwordError"></small>
                </div>


                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required />
                    <small class="error" id="confirmPasswordError"></small>
                </div>

                <button type="submit" class="register-btn">Register</button>
            </form>

            <p class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>
    <script src="assets/js/module2.js"></script>
</body>

</html>
